name: CI Build

on:
  push:
    branches:
      - master
      - "v*"
  pull_request:
  schedule:
    - cron: "0 3 * * *" # daily, at 3am

jobs:
  lint:
    timeout-minutes: 5
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install 
      - run: pnpm lint

  test:
    timeout-minutes: 5
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install 
      - run: |
          google-chrome --version

      - name: Build addon
        working-directory: addon
        run: pnpm build
      - run: pnpm test
        working-directory: test-app

  docs-gen:
    timeout-minutes: 5
    name: Docs Generation
    runs-on: ubuntu-latest

    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install 
      - run: pnpm build:docs
      - run: echo "If this fails, docs gen is out of sync. Please run 'pnpm build:docs'" && git diff --exit-code


  floating:
    name: "Floating Dependencies"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --no-lockfile
      - name: Build addon
        working-directory: addon
        run: pnpm build
      - name: Run Tests
        working-directory: test-app
        run: pnpm test

  try-scenarios:
    timeout-minutes: 10
    name: "Try: ${{ matrix.ember-try-scenario }}"

    runs-on: ubuntu-latest

    needs: test

    strategy:
      fail-fast: false
      matrix:
        ember-try-scenario:
          - ember-lts-4.4
          - ember-lts-4.8
          - ember-lts-4.12
          - ember-lts-5.4
          - ember-lts-5.8
          - ember-release
          - ember-beta
          - ember-canary
          - ember-default
          - embroider-safe
          - embroider-optimized 

    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install 
      - name: Build addon
        working-directory: addon
        run: pnpm build
      - name: test
        working-directory: test-app
        run: |
          pnpm _syncPnpm
          node_modules/.bin/ember try:one ${{ matrix.ember-try-scenario }} --skip-cleanup

  types:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        ts-version:
          - 5.0
          - 5.1
          - 5.2
          - 5.3
          - 5.4
          - 5.5
          - next

    steps:
      - name: "Install StepSecurity Action"
        id: step_security
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install 
      - name: Build types for addon
        working-directory: addon
        run: pnpm build
      - name: install TS version
        working-directory: type-tests
        run: pnpm add --save-dev typescript@${{matrix.ts-version}}
      - name: public types
        working-directory: type-tests
        run: pnpm test 
